<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JEREMI</title>
<style>
:root {
  --bg:#0b0d10; --panel:#14171b; --panel2:#1b1f24; --line:#2a2f36;
  --ink:#e9ebee; --muted:#8b9099; --accent:#c9a227;
  --green:#3fae3f; --blue:#4d8fd1; --purple:#9b4fb0; --yellow:#d4c736;
  --tile:#efe6d2; --tile-ink:#1b1208;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);font-family:Georgia,serif;min-height:100vh}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap;gap:6px}
.brand{font-weight:bold;letter-spacing:3px;color:var(--accent);font-size:18px}
.turn-pill{background:var(--panel2);border:1px solid var(--line);border-radius:20px;padding:5px 12px;font-size:12px}
.topbar-actions button{background:var(--panel2);color:var(--ink);border:1px solid var(--line);border-radius:5px;padding:5px 9px;margin-left:4px;font-size:11px;cursor:pointer;font-family:inherit}
.topbar-actions button:hover{background:#232830}

/* LAYOUT */
.main-layout{display:flex;gap:12px;padding:10px;flex-wrap:wrap;justify-content:center;align-items:flex-start}

/* SCOREBOARD */
.scoreboard{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px;min-width:160px;max-width:190px}
.scoreboard h3{font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
.score-row{display:flex;justify-content:space-between;padding:5px 7px;border-radius:5px;margin-bottom:3px;font-size:12px}
.score-row.active{background:rgba(201,162,39,.15);border:1px solid var(--accent)}
.score-row .pts{color:var(--accent);font-weight:bold}
.bag-info{margin-top:8px;padding-top:8px;border-top:1px solid var(--line);font-size:11px;color:var(--muted)}

/* BOARD WRAPPER */
.board-outer{display:flex;align-items:stretch}
.jeremi-side{writing-mode:vertical-rl;transform:rotate(180deg);background:#fff;color:#7a1f3d;font-weight:bold;font-size:17px;letter-spacing:4px;display:flex;align-items:center;justify-content:center;padding:0 6px;font-family:Georgia,serif;user-select:none;flex-shrink:0}
.board{display:grid;grid-template-columns:repeat(15,32px);grid-template-rows:repeat(15,32px);background:#111;border:1px solid #111}

/* CELL */
.cell{width:32px;height:32px;border:1px solid #1c1c1c;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:bold;position:relative;background:#000;color:#2a2a2a;cursor:pointer;box-sizing:border-box;overflow:hidden}
/* Physical board colour mapping — quadrant determines colour of bonus square */
.cell.TL-green{background:var(--green);color:#000}
.cell.DM-green{background:var(--green);color:#000}
.cell.DL-green{background:var(--green);color:#000}
.cell.DS-green{background:var(--green);color:#000}
.cell.TL-blue{background:var(--blue);color:#000}
.cell.DM-blue{background:var(--blue);color:#000}
.cell.DL-blue{background:var(--blue);color:#000}
.cell.DS-blue{background:var(--blue);color:#000}
.cell.TL-purple{background:var(--purple);color:#fff}
.cell.DM-purple{background:var(--purple);color:#fff}
.cell.DL-purple{background:var(--purple);color:#fff}
.cell.DS-purple{background:var(--purple);color:#fff}
.cell.TL-yellow{background:var(--yellow);color:#000}
.cell.DM-yellow{background:var(--yellow);color:#000}
.cell.DL-yellow{background:var(--yellow);color:#000}
.cell.DS-yellow{background:var(--yellow);color:#000}
.cell.TM{background:#000;color:#fff}
.cell.start{padding:0}
.cell.drop-ok{outline:2px solid rgba(255,255,255,.7);z-index:2}
.cell.drop-diac{outline:2px solid var(--yellow);z-index:2}
.cell.placed-now{box-shadow:inset 0 0 0 2px #fff}
.board-tile{width:28px;height:28px;background:var(--tile);color:var(--tile-ink);border-radius:3px;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:11px;box-shadow:0 1px 2px rgba(0,0,0,.5);position:relative;cursor:grab}
.board-tile .pb{position:absolute;bottom:0;right:1px;font-size:6px;color:#6b5a35;font-weight:normal}
.board-tile.locked{cursor:default}

/* TILE REFERENCE */
.tile-ref{background:#fff;padding:6px 8px;font-family:monospace;overflow-y:auto;max-width:230px;flex-shrink:0}
.tile-ref .ref-title{color:#7a1f3d;font-family:Georgia,serif;font-weight:bold;font-size:11px;margin:4px 0 2px}
.tile-ref table{border-collapse:collapse}
.tile-ref td{border:1px solid #4a8a96;padding:0 4px;text-align:center;font-size:9px;color:#0a1a22;background:#bfe3ea;line-height:12px}
.tile-ref td.sym{font-weight:bold}

/* WORD LOG */
.word-log{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px;min-width:160px;max-width:190px;max-height:500px;overflow-y:auto}
.word-log h3{font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
.log-entry{font-size:11px;padding:4px 0;border-bottom:1px solid var(--line)}
.log-word{color:var(--accent);font-weight:bold}
.log-meta{color:var(--muted);font-size:10px}

/* RACK */
.rack-area{background:var(--panel);border-top:1px solid var(--line);padding:10px 14px;display:flex;flex-direction:column;align-items:center;gap:8px}
.rack-label{font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
.rack{display:flex;gap:6px;min-height:54px;padding:6px;background:var(--panel2);border-radius:7px;border:1px solid var(--line);flex-wrap:wrap;justify-content:center}
.rack-tile{width:42px;height:50px;background:var(--tile);color:var(--tile-ink);border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:bold;font-size:16px;box-shadow:0 2px 3px rgba(0,0,0,.5);cursor:grab;position:relative;user-select:none;transition:transform .1s;border:2px solid transparent}
.rack-tile.sel{transform:translateY(-8px);border-color:var(--accent)}
.rack-tile.drag{opacity:.3}
.rack-tile.diac{border-color:var(--purple)}
.rack-tile.blank{background:#d8d8d8}
.rack-tile .pb{font-size:8px;color:#6b5a35;font-weight:normal;position:absolute;bottom:2px;right:3px}

/* ACTIONS */
.action-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.btn{background:var(--panel2);color:var(--ink);border:1px solid var(--line);border-radius:6px;padding:8px 14px;font-size:12px;cursor:pointer;font-family:inherit}
.btn:hover{background:#232830}
.btn.primary{background:var(--accent);color:#1a1300;font-weight:bold;border-color:var(--accent)}
.btn.primary:hover{background:#ddb52f}

/* MODALS */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;z-index:100;padding:16px}
.ov.show{display:flex}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:18px;max-width:420px;width:100%;max-height:82vh;overflow-y:auto}
.modal h2{margin:0 0 10px;color:var(--accent);font-size:16px}
.modal p{font-size:12px;line-height:1.5;color:var(--ink);margin-bottom:8px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:12px;flex-wrap:wrap}
.setup-field{margin-bottom:10px}
.setup-field label{display:block;font-size:11px;color:var(--muted);margin-bottom:3px}
.setup-field input,.setup-field select{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:5px;padding:7px;font-size:13px;font-family:inherit}
.ipa-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin:8px 0;max-height:250px;overflow-y:auto}
.ipa-grid button{background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:4px;padding:6px 3px;font-size:13px;cursor:pointer}
.ipa-grid button:hover{background:var(--accent);color:#1a1300}

/* TOAST */
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--panel2);border:1px solid var(--line);color:var(--ink);padding:8px 18px;border-radius:8px;font-size:12px;font-weight:600;opacity:0;transition:all .25s;z-index:200;pointer-events:none;max-width:88vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--green)}
.toast.err{border-color:#d23b3b;color:#ffb3b3}
.toast.info{border-color:var(--blue)}

@media(max-width:700px){
  .board{grid-template-columns:repeat(15,22px);grid-template-rows:repeat(15,22px)}
  .cell{width:22px;height:22px;font-size:7px}
  .board-tile{width:19px;height:19px;font-size:9px}
  .tile-ref{display:none}
  .word-log{display:none}
}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<!-- SETUP -->
<div class="ov show" id="ovSetup">
  <div class="modal">
    <h2>JEREMI — New Game</h2>
    <div class="setup-field"><label>Number of Players</label>
      <select id="numPlayers" onchange="updateFields()">
        <option value="2">2 Players</option>
        <option value="3">3 Players</option>
        <option value="4">4 Players</option>
      </select></div>
    <div id="playerFields"></div>
    <div class="setup-field"><label>AI Difficulty (last player slot)</label>
      <select id="aiDiff">
        <option value="none">No AI — All Human</option>
        <option value="soft">AI — Soft</option>
        <option value="medium" selected>AI — Medium</option>
        <option value="hard">AI — Hard</option>
      </select></div>
    <div class="setup-field">
      <label>Multiplayer Mode</label>
      <select id="mpMode" onchange="toggleMP()">
        <option value="local">Local / Same Device</option>
        <option value="online">Online Multiplayer (different devices)</option>
      </select>
    </div>
    <div id="mpFields" style="display:none">
      <div class="setup-field">
        <label>Server URL</label>
        <input type="text" id="mpServer" value="" placeholder="https://jeremi-wxd4.onrender.com">
      </div>
      <div class="setup-field">
        <label>Room Code (leave blank to create new room)</label>
        <input type="text" id="mpRoom" placeholder="e.g. ABC123" style="text-transform:uppercase;letter-spacing:3px">
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn" onclick="loadGame()">Load Saved</button>
      <button class="btn primary" onclick="startGame()">Start Game</button>
    </div>
  </div>
</div>

<!-- BLANK -->
<div class="ov" id="ovBlank">
  <div class="modal">
    <h2>Choose Symbol for Blank</h2>
    <p>Blank tile scores 0 pts but can be any symbol.</p>
    <div class="ipa-grid" id="blankGrid"></div>
    <div class="modal-btns"><button class="btn" onclick="cancelBlank()">Cancel</button></div>
  </div>
</div>

<!-- INFO -->
<div class="ov" id="ovInfo">
  <div class="modal">
    <h2 id="infoTitle"></h2>
    <div id="infoBody"></div>
    <div class="modal-btns" id="infoBtns"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
